<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<title>Weather forecast</title>

</head>

<body>

<div class="sun"></div>
<div class="cloud-layer"></div>
<div class="rain"></div>
<div class="snow"></div>

<div class="weatherbox">

<div class="searchbar">

<input type="text" placeholder="enter the city name">

<button>
<img src="search.png">
</button>

</div>

<div class="weather">

<img src="" class="weather-icon">

<h1 class="temp">--°C</h1>

<h2 class="city">City</h2>

<div class="detailed">

<div class="col">

<img src="humidity.png">

<div>
<p class="humidity">--%</p>
<p>humidity</p>
</div>

</div>

<div class="col">

<img src="wind.png">

<div>
<p class="wind">-- km/h</p>
<p>wind speed</p>
</div>

</div>

</div>

</div>

</div>

<script src="weather.js"></script>

</body>
</html>
